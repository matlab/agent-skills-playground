<!DOCTYPE html>
<html data-theme="dark">
<head>
    <style>
        /* ===== THEME VARIABLES — Minimal Mono ===== */

        :root {
            /* Light mode */
            --color-bg: #f0fafa;
            --color-surface: rgba(0, 0, 0, 0.02);
            --color-surface-hover: rgba(0, 0, 0, 0.04);
            --color-surface-active: rgba(0, 0, 0, 0.06);
            --color-accent: #6366f1;
            --color-accent-muted: rgba(99, 102, 241, 0.1);
            --color-text-primary: #0f172a;
            --color-text-secondary: #475569;
            --color-text-muted: #94a3b8;
            --color-border: rgba(0, 0, 0, 0.06);
            --color-track: rgba(0, 0, 0, 0.08);

            --font-family: 'Inter', -apple-system, system-ui, sans-serif;
            --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;
        }

        [data-theme="dark"] {
            --color-bg: #0a1a1a;
            --color-surface: rgba(255, 255, 255, 0.02);
            --color-surface-hover: rgba(255, 255, 255, 0.04);
            --color-surface-active: rgba(255, 255, 255, 0.06);
            --color-accent: #a5b4fc;
            --color-accent-muted: rgba(165, 180, 252, 0.15);
            --color-text-primary: #e2e8f0;
            --color-text-secondary: #64748b;
            --color-text-muted: #374151;
            --color-border: rgba(255, 255, 255, 0.06);
            --color-track: rgba(255, 255, 255, 0.08);
        }

        /* ===== BASE STYLES ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background: var(--color-bg);
            color: var(--color-text-primary);
            padding: 12px;
            height: 100vh;
            overflow-y: auto;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 1.5px;
        }

        /* ===== LAYOUT ===== */
        .controls-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 360px;
            margin: 0 auto;
        }

        .panel {
            background: var(--color-surface);
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid var(--color-border);
            animation: fadeIn 0.3s ease-out both;
        }

        .panel:nth-child(2) { animation-delay: 0.03s; }
        .panel:nth-child(3) { animation-delay: 0.06s; }
        .panel:nth-child(4) { animation-delay: 0.09s; }

        .section-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--color-text-secondary);
            margin-bottom: 12px;
        }

        /* ===== BUTTONS ===== */
        .button-group {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: none;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: var(--color-accent);
            color: #0a1a1a;
        }

        .btn-primary:hover {
            opacity: 0.85;
        }

        .btn-secondary {
            background: transparent;
            color: var(--color-text-secondary);
            border: 1px solid var(--color-border);
        }

        .btn-secondary:hover {
            color: var(--color-text-primary);
            border-color: var(--color-accent);
        }

        /* ===== SLIDERS ===== */
        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slider-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: var(--color-text-secondary);
        }

        .slider-value {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 600;
            color: var(--color-accent);
            font-variant-numeric: tabular-nums;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 3px;
            border-radius: 1.5px;
            background: var(--color-track);
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--color-accent);
            cursor: pointer;
            transition: transform 150ms ease;
        }

        input[type="range"]:active::-webkit-slider-thumb {
            transform: scale(1.3);
        }

        input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--color-accent);
            border: none;
            cursor: pointer;
        }

        /* ===== TOGGLES ===== */
        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toggle-label {
            font-size: 13px;
            font-weight: 400;
            color: var(--color-text-primary);
        }

        .toggle {
            width: 36px;
            height: 20px;
            border-radius: 10px;
            background: var(--color-track);
            position: relative;
            cursor: pointer;
            transition: background 250ms ease;
            flex-shrink: 0;
        }

        .toggle.active {
            background: var(--color-accent);
        }

        .toggle::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--color-text-muted);
            top: 3px;
            left: 3px;
            transition: all 250ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toggle.active::after {
            transform: translateX(16px);
            background: #0a1a1a;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== FOCUS-VISIBLE (keyboard) — uihtml design guardrails ===== */
        .btn:focus-visible,
        .toggle:focus-visible {
            outline: 2px solid var(--color-accent, var(--accent-secondary, var(--color-primary, var(--md-primary, Highlight))));
            outline-offset: 2px;
        }
        input[type="range"]:focus-visible::-webkit-slider-thumb {
            box-shadow: 0 0 0 3px var(--color-accent, var(--accent-secondary, var(--color-primary, var(--md-primary, Highlight))));
        }
        input[type="range"]:focus-visible::-moz-range-thumb {
            box-shadow: 0 0 0 3px var(--color-accent, var(--accent-secondary, var(--color-primary, var(--md-primary, Highlight))));
        }

        /* ===== REDUCED MOTION — uihtml design guardrails ===== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>

    <script type="text/javascript">
        // ===== MATLAB UIHTML INTEGRATION =====

        function handleToggleKey(event) {
            if (event.key === ' ' || event.key === 'Enter') {
                event.preventDefault();
                event.currentTarget.click();
            }
        }

        function setup(htmlComponent) {
            window.htmlComponent = htmlComponent;

            htmlComponent.addEventListener("UpdateValues", function(event) {
                const data = event.Data;
            });

            htmlComponent.addEventListener("SetTheme", function(event) {
                document.documentElement.setAttribute('data-theme', event.Data.theme);
            });

            sendState();
        }

        // ===== STATE MANAGEMENT =====

        let state = {
            slider1: 50,
            toggle1: false
        };

        function sendState() {
            if (window.htmlComponent) {
                window.htmlComponent.sendEventToMATLAB("StateChange", state);
            }
        }

        // ===== COMPONENT HANDLERS =====

        function onSliderChange(name, value) {
            value = parseFloat(value);
            state[name] = value;

            const display = document.getElementById(name + "Value");
            if (display) {
                display.textContent = value.toFixed(1);
            }

            if (window.htmlComponent) {
                window.htmlComponent.sendEventToMATLAB("SliderChange", {
                    control: name,
                    value: value
                });
            }
        }

        function onToggle(name) {
            state[name] = !state[name];
            const el = document.getElementById(name);
            el.classList.toggle('active');
            el.setAttribute('aria-checked', el.classList.contains('active'));

            if (window.htmlComponent) {
                window.htmlComponent.sendEventToMATLAB("ToggleChange", {
                    control: name,
                    value: state[name]
                });
            }
        }

        function onButtonClick(action) {
            if (window.htmlComponent) {
                window.htmlComponent.sendEventToMATLAB("ButtonClick", {
                    action: action
                });
            }
        }

        // ===== THEME TOGGLE =====

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            document.getElementById('themeToggle').setAttribute('aria-checked', next === 'dark');

            if (window.htmlComponent) {
                window.htmlComponent.sendEventToMATLAB("ThemeChange", { theme: next });
            }
        }
    </script>
</head>
<body>
    <div class="controls-container">

        <!-- Buttons Panel -->
        <div class="panel">
            <div class="section-label">Actions</div>
            <div class="button-group">
                <button class="btn btn-primary" onclick="onButtonClick('play')">Play</button>
                <button class="btn btn-secondary" onclick="onButtonClick('reset')">Reset</button>
            </div>
        </div>

        <!-- Slider Panel -->
        <div class="panel">
            <div class="section-label">Parameters</div>
            <div class="slider-group">
                <div class="slider-header">
                    <span class="slider-label">Speed</span>
                    <span id="slider1Value" class="slider-value">50.0</span>
                </div>
                <input type="range" id="slider1" min="0" max="100" step="0.1" value="50"
                       oninput="onSliderChange('slider1', this.value)">
            </div>
        </div>

        <!-- Toggle Panel -->
        <div class="panel">
            <div class="section-label">Options</div>
            <div class="toggle-group">
                <span class="toggle-label">Auto-rotate</span>
                <div id="toggle1" class="toggle" onclick="onToggle('toggle1')" tabindex="0" role="switch" aria-checked="false" onkeydown="handleToggleKey(event)"></div>
            </div>
        </div>

        <!-- Theme Toggle -->
        <div class="panel">
            <div class="section-label">Appearance</div>
            <div class="toggle-group">
                <span class="toggle-label">Dark Mode</span>
                <div id="themeToggle" class="toggle active" onclick="toggleTheme()" tabindex="0" role="switch" aria-checked="true" onkeydown="handleToggleKey(event)"></div>
            </div>
        </div>

    </div>
</body>
</html>
