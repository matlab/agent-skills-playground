<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATLAB uihtml Style Gallery</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0f0f14;
            color: #e2e8f0;
            padding: 40px 24px;
            min-height: 100vh;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .gallery-header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gallery-header p {
            font-size: 15px;
            color: #94a3b8;
            max-width: 500px;
            margin: 0 auto;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 32px;
            max-width: 1680px;
            margin: 0 auto;
        }

        .style-card {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: border-color 250ms ease, transform 250ms ease;
        }

        .style-card:hover {
            border-color: rgba(167, 139, 250, 0.4);
            transform: translateY(-2px);
        }

        .style-card-header {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .style-card-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .style-card-header .vibe {
            font-size: 12px;
            color: #94a3b8;
            font-style: italic;
        }

        .style-card iframe {
            width: 100%;
            height: 380px;
            border: none;
            display: block;
        }

        .theme-toggle-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .theme-toggle-bar button {
            padding: 8px 20px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 9999px;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            transition: all 200ms ease;
        }

        .theme-toggle-bar button.active {
            background: rgba(167, 139, 250, 0.2);
            border-color: rgba(167, 139, 250, 0.5);
            color: #a78bfa;
        }

        .theme-toggle-bar button:hover:not(.active) {
            border-color: rgba(255, 255, 255, 0.3);
            color: #e2e8f0;
        }
    </style>
</head>
<body>

<div class="gallery-header">
    <h1>uihtml Style Gallery</h1>
    <p>Browse all 8 built-in styles. Each preview shows the same control panel (buttons, slider, toggle) rendered in the style's aesthetic. Use the toggle above to compare light and dark modes.</p>
</div>

<div class="theme-toggle-bar">
    <button class="active" onclick="setAllThemes('dark')">Dark Mode</button>
    <button onclick="setAllThemes('light')">Light Mode</button>
</div>

<div class="gallery-grid" id="gallery"></div>

const gallery = document.getElementById('gallery');

styles.forEach((style, index) => {
    const card = document.createElement('div');
    card.className = 'style-card';

    const srcdoc = `<!DOCTYPE html><html data-theme="dark"><head><style>* { box-sizing: border-box; margin: 0; padding: 0; } ${style.css.replace(/"/g, '&quot;')}</style><script>window.addEventListener('message', function(e) { if (e.data && e.data.theme) { document.documentElement.setAttribute('data-theme', e.data.theme); } });<\/script></head><body>${previewHTML}</body></html>`;

    card.innerHTML = `
        <div class="style-card-header">
            <h2>${style.name}</h2>
            <span class="vibe">${style.vibe}</span>
        </div>
        <iframe id="frame-${index}" srcdoc="${srcdoc.replace(/"/g, '&quot;')}"></iframe>
    `;
    gallery.appendChild(card);
});

function setAllThemes(theme) {
    const buttons = document.querySelectorAll('.theme-toggle-bar button');
    buttons.forEach(btn => btn.classList.remove('active'));
    if (theme === 'dark') buttons[0].classList.add('active');
    else buttons[1].classList.add('active');

    document.querySelectorAll('.style-card iframe').forEach(iframe => {
        iframe.contentWindow.postMessage({ theme: theme }, '*');
    });
}
